name: Android Auto Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # यह आपको GitHub से मैन्युअली रन करने का ऑप्शन भी देगा

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find gradlew and Build APK
      run: |
        echo "Searching for gradlew in the repository..."
        # gradlew फाइल को पूरे प्रोजेक्ट में ढूँढें
        GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ Error: gradlew फाइल प्रोजेक्ट में नहीं मिली!"
          echo "कृपया चेक करें कि क्या आपने Android प्रोजेक्ट कोड GitHub पर अपलोड किया है।"
          exit 1
        fi
        
        # उस फोल्डर में जाएं जहाँ gradlew मिला है
        GRADLE_DIR=$(dirname "$GRADLE_PATH")
        echo "✅ gradlew found in: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        # परमिशन दें और बिल्ड करें
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        # यह पूरे प्रोजेक्ट में जहाँ भी .apk फाइल बनेगी, उसे ढूँढकर अपलोड कर देगा
        path: '**/*.apk'
