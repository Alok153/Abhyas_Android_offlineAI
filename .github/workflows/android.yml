name: Flutter APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # मैन्युअल रन के लिए

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # यह स्टेप GitHub सर्वर पर Flutter इंस्टॉल करेगा
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # यह प्रोजेक्ट की सभी ज़रूरी फाइल्स (packages) डाउनलोड करेगा
    - name: Install Dependencies
      run: flutter pub get

    # यह Flutter का इस्तेमाल करके APK बनाएगा
    - name: Build APK
      run: flutter build apk --debug

    # बनी हुई APK फाइल को डाउनलोड के लिए उपलब्ध कराएगा
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-flutter-app
        path: build/app/outputs/flutter-apk/app-debug.apk
