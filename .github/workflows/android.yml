name: Android Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # मैन्युअल रन के लिए

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK using Global Gradle
      run: |
        echo "Going into android folder..."
        cd android
        
        echo "Building APK..."
        # gradlew की जगह हम डायरेक्ट gradle कमांड का इस्तेमाल कर रहे हैं
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: '**/*.apk'
